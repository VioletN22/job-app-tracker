name: Build Windows (friend / lite)

# Manual trigger: GitHub → Actions → "Build Windows (friend / lite)" → Run workflow.
# Builds the LITE edition on a real Windows runner (compiles the native DB module
# there), and uploads a downloadable installer + portable .exe + the extension.
on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Switch to LITE (friend) edition
        shell: bash
        run: printf 'export const LITE = true;\n' > src/shared/edition.ts

      - name: Compile (renderer + main)
        run: npm run build

      - name: Package Windows app
        run: npx electron-builder --config electron-builder.win.js --win --x64 --publish never

      - name: Smoke test — boot the built app on Windows
        shell: pwsh
        run: |
          $exe = "release\win-unpacked\aplyd.exe"
          if (!(Test-Path $exe)) { Write-Error "built exe not found: $exe"; exit 1 }
          $env:APLYD_SMOKETEST = "1"
          Write-Host "Booting $exe (loads native DB module + edition module, runs a query)…"
          $p = Start-Process -FilePath $exe -PassThru
          if (!$p.WaitForExit(60000)) { $p.Kill(); Write-Error "app did not exit within 60s (hung on boot)"; exit 1 }
          Write-Host "exit code: $($p.ExitCode)"
          $log = Join-Path $env:TEMP "aplyd-main.log"
          if (Test-Path $log) { Write-Host "---- last log lines ----"; Get-Content $log -Tail 8 }
          if ($p.ExitCode -ne 0) { Write-Error "smoke test FAILED (app crashed on boot)"; exit 1 }
          Write-Host "Smoke test PASSED — the packaged Windows app boots cleanly."

      - name: Stage artifacts (exe + extension + readme)
        shell: bash
        run: |
          mkdir -p out
          cp release/*.exe out/ 2>/dev/null || true
          cp -r extension out/aplyd-chrome-extension
          cp scripts/FRIEND_README_WINDOWS.md out/README.md 2>/dev/null || true
          ls -la out

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: aplyd-windows
          path: out
          if-no-files-found: error
